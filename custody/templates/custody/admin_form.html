{% extends 'custody/base.html' %}
{% load static i18n %}
{% block title %}{% trans 'Add Admin' %} - {{ SITE_NAME }}{% endblock %}
{% block page_title %}{% trans 'Add New Admin' %}{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-medium">{% trans 'Username' %}</label>
                        <input type="text" name="username" class="form-control form-control-lg" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium">{% trans 'Password' %}</label>
                        <input type="password" name="password" class="form-control form-control-lg" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-shield-plus"></i> {% trans 'Create Admin' %}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
