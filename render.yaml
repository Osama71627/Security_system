services:
  - type: web
    name: security-system
    runtime: python
    branch: main
    buildCommand: ./build.sh
    startCommand: gunicorn app:app
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: security-db
          property: connectionString
      - key: DJANGO_DEBUG
        value: "false"


databases:
  - name: security-db
    databaseName: security
    plan: free
